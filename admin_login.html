<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login | ShopZone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container" style="max-width:480px;margin-top:40px">
    <h3>Admin Panel</h3>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    {% if signup %}
    <form method="post" action="{{ url_for('admin_signup') }}">
      <div class="mb-2"><label class="form-label">Name</label><input class="form-control" name="name" required></div>
      <div class="mb-2"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
      <div class="mb-2"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
      <button class="btn btn-primary">Create Admin</button>
      <a href="{{ url_for('admin') }}" class="btn btn-link">Back to login</a>
    </form>
    {% else %}
    <form method="post" action="{{ url_for('admin_login') }}">
      <div class="mb-2"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
      <div class="mb-2"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
      <button class="btn btn-primary">Sign in</button>
      <a href="{{ url_for('admin_signup') }}" class="btn btn-link">Create admin account</a>
      <a href="{{ url_for('home') }}" class="btn btn-link">Home</a>
    </form>
    {% endif %}
  </div>
</body>
</html>
