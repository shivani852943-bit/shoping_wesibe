<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Panel | ShopZone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Admin Panel</h3>
      <div>
        <a href="{{ url_for('admin_add_product') }}" class="btn btn-success btn-sm">Add Product</a>
        <a href="{{ url_for('admin_logout') }}" class="btn btn-secondary btn-sm">Logout</a>
      </div>
    </div>
    <table class="table table-striped">
      <thead>
        <tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Active</th><th>Actions</th></tr>
      </thead>
      <tbody>
        {% for p in products %}
        <tr>
          <td>{{ p.id }}</td>
          <td>{{ p.name }}</td>
          <td>{{ p.category }}</td>
          <td>₹{{ p.price }}</td>
          <td>{{ p.stock }}</td>
          <td>{{ 'Yes' if p.active else 'No' }}</td>
          <td>
            <a href="{{ url_for('admin_edit_product', product_id=p.id) }}" class="btn btn-sm btn-primary">Edit</a>
            <form method="post" action="{{ url_for('admin_delete_product', product_id=p.id) }}" style="display:inline-block" onsubmit="return confirm('Delete this product?')">
              <button class="btn btn-sm btn-danger">Delete</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
