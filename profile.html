<!DOCTYPE html>
<!-- File-purpose comment: Template file profile.html. Used by Flask to render this page. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.profile-card{
    border-radius:15px;
}
.profile-img{
    width:100px;
    height:100px;
    border-radius:50%;
    border:4px solid #0d6efd;
}
.list-group-item:hover{
    background:#0d6efd;
    color:#fff;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container py-5">

<div class="row">

    <!-- Left -->
    <div class="col-md-4">

        <div class="card profile-card shadow text-center p-4">

          <!--  <img src="https://i.pravatar.cc/150?img=12" class="profile-img mx-auto">-->

            <h4 class="mt-3">John Doe</h4>
            <p class="text-muted">john@gmail.com</p>

            <button class="btn btn-primary w-100">
                Edit Profile
            </button>

        </div>

    </div>

    <!-- Right -->
    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                My Account
            </div>

            <div class="list-group list-group-flush">

                <a class="list-group-item">
                    <i class="bi bi-box"></i> My Orders
                </a>

                <a class="list-group-item">
                    <i class="bi bi-heart"></i> Wishlist
                </a>

                <a class="list-group-item">
                    <i class="bi bi-geo-alt"></i> Address
                </a>

                <a class="list-group-item">
                    <i class="bi bi-lock"></i> Change Password
                </a>

                <a class="list-group-item text-danger">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
