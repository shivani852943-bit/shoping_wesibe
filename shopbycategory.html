<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    margin:0;
    background:#f8f8f8;
    font-family:Arial, Helvetica, sans-serif;
}


/* Heading */

.category-title{

    text-align:center;
    font-size:42px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:2px;
    margin:50px 0 40px;
    color:#222;

}


/* Category Row */

.category-row{

    display:flex;
    flex-wrap:wrap;

}


/* 5 Column */

.category-item{

    flex:0 0 20%;
    max-width:20%;
    padding:12px;

}


/* Link */

.category-link{

    text-decoration:none;
    color:#222;

}


/* Card */

.category-card{

    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    transition:.3s;

}


.category-card:hover{

    transform:translateY(-10px);
    box-shadow:0 15px 30px rgba(0,0,0,.20);

}



.category-card img{

    width:100%;
    height:220px;
    object-fit:cover;

}



.category-name{

    text-align:center;
    padding:15px;
    font-size:18px;
    font-weight:800;
    text-transform:uppercase;

}



/* Responsive */

@media(max-width:992px){

.category-item{

    flex:0 0 33.33%;
    max-width:33.33%;

}

}


@media(max-width:576px){

.category-item{

    flex:0 0 100%;
    max-width:100%;

}

}

</style>


</head>
